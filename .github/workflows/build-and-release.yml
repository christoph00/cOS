name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Build the container
        run: podman build -t cos .

      - name: Extract artifacts
        run: |
          mkdir -p artifacts
          podman create --name cos --entrypoint="" cos ""
          podman cp cos:os.efi artifacts/os.efi
          podman cp cos:rootfs.tar.gz artifacts/rootfs.tar.gz
          podman rm cos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: os-artifacts
          path: artifacts

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: os-artifacts
          path: artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (os.efi)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/os.efi
          asset_name: os.efi
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (rootfs.tar.gz)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/rootfs.tar.gz
          asset_name: rootfs.tar.gz
          asset_content_type: application/gzip
